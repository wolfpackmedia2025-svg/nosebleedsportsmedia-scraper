services:
  - type: web
    name: nosebleedsportsmedia-scraper
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://nosebleedsportsmedia.com,http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.0
